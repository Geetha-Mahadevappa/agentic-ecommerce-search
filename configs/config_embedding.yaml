# General settings for embedding pipeline

paths:
  raw_dir: "data/raw"
  purchase_csv: "customer_purchase_data.csv"
  reviews_csv: "customer_reviews_data.csv"
  embed_dir: "data/embeddings"
  embeddings_npz: "data/embeddings/product_embeddings.npz"
  mapping_parquet: "data/embeddings/id_mapping.parquet"
  metadata_db: "data/embeddings/metadata.sqlite"
  manifest_json: "data/embeddings/manifest.json"

model:
  name:  "all-mpnet-base-v2"
  version:  "all-mpnet-base-v2"
  device: "cuda"

embedding:
  batch_size: 32
  max_reviews: 10
  max_review_chars: 1000


