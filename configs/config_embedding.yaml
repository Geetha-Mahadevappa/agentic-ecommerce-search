# Configs for embedding pipeline

paths:
  raw_dir: "data/raw"
  embed_dir: "data/embeddings"
  purchase_csv: "data/raw/customer_purchase_data.csv"
  reviews_csv: "data/raw/customer_reviews_data.csv"
  embeddings_npz: "data/embeddings/product_embeddings.npz"
  mapping_parquet: "data/embeddings/id_mapping.parquet"
  metadata_db: "data/embeddings/metadata.sqlite"
  manifest_json: "data/embeddings/manifest.json"

model:
  name: "all-mpnet-base-v2"
  version: "all-mpnet-base-v2-v1"

embedding:
  batch_size: 256
  chunk_words: 300
  chunk_overlap: 50
  max_review_chars: 5000

