# Procedural Memory for E-commerce Search System
category_keywords:
  - electronics
  - home appliances

synonyms:
  bulb: ["bulb", "light", "lamp", "smart bulb"]
  led: ["led", "led light", "led bulb"]

  headphones: ["headphones", "earphones", "headset", "buds"]
  earphones: ["earphones", "earbuds"]

  speaker: ["speaker", "bluetooth speaker", "wireless speaker"]

  laptop: ["laptop", "notebook", "computer"]
  printer: ["printer", "inkjet printer", "laser printer"]
  monitor: ["monitor", "display", "screen"]

  blender: ["blender", "mixer"]
  coffee maker: ["coffee maker", "coffee machine"]
  vacuum: ["vacuum", "vacuum cleaner"]

  hedphones: ["headphones"]
  prnter: ["printer"]
  blub: ["bulb"]

# Price bands
price_bands:
  electronics:
    low: [0, 50]
    medium: [50, 200]
    high: [200, 99999]

  home_appliances:
    low: [0, 100]
    medium: [100, 300]
    high: [300, 99999]

# Rules for interpreting user query
query_rules:
  short_query_is_product: true

  detect_price_intent:
    - "cheap"
    - "budget"
    - "affordable"
    - "low cost"
    - "under"
    - "below"
    - "less than"

  detect_quality_intent:
    - "best"
    - "top"
    - "latest"
    - "high quality"

  detect_model_number: true

# Text normalization rules applied before retrieval
normalization_rules:
  lowercase: true
  remove_hyphens: true
  normalize_plurals: true
