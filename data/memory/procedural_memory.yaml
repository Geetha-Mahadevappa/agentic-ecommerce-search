# Procedural Memory for E-commerce Search System
category_keywords:
  - electronics
  - home appliances

# Price bands
price_bands:
  electronics:
    low: [0, 100]
    medium: [100, 300]
    high: [300, 99999]

  home_appliances:
    low: [0, 100]
    medium: [100, 300]
    high: [300, 99999]

# Country currency extraction rules
currency_rules:
  symbols:
    - "$"
    - "€"
    - "£"
    - "¥"
    - "₹"
    - "₩"
    - "₦"
    - "₽"
    - "₱"


# Query interpretation rules
query_rules:
  short_query_is_product: true

  low_price_intent:
    - "cheap"
    - "budget"
    - "affordable"
    - "low cost"
    - "low price"
    - "economical"
    - "value"

  mid_price_intent:
    - "mid range"
    - "mid-range"
    - "mid tier"
    - "mid-tier"
    - "reasonable"
    - "value for money"

  high_price_intent:
    - "premium"
    - "luxury"
    - "high-end"
    - "high end"
    - "high quality"
    - "flagship"
    - "pro"
    - "professional"
    - "elite"
    - "ultimate"
    - "top-tier"
    - "top tier"
    - "top"
    - "best"
    - "expensive"
    - "deluxe"

  numeric_price_triggers:
    - "under"
    - "below"
    - "less than"


# Text normalization rules
normalization_rules:
  lowercase: true
  remove_hyphens: true
  normalize_plurals: true
