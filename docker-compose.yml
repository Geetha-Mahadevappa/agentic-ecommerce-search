services:
  search_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: search-api:latest

    ports:
      - "8000:8000"

    restart: unless-stopped

    environment:
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    runtime: nvidia

    networks:
      - search_network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 360s   # allow model loading on first run

networks:
  search_network:
    driver: bridge
