services:
  search_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: search-api:latest

    ports:
      - "8000:8000"

    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - search_network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 360s

networks: 
  search_network: 
    driver: bridge
